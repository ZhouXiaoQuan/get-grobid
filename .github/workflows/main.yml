name: Docker Image Downloader
on: [workflow_dispatch] # 手动触发

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Maximize Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
      - name: Pull and Save Image
        run: |
          docker pull lfoppiano/grobid:latest-full
          docker save lfoppiano/grobid:latest-full -o grobid_full.tar
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: grobid-tar
          path: grobid_full.tar
          retention-days: 1
